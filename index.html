<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SHEIN Gift Card</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
  :root{
    --pink:#ff4fa6;
    --pink2:#ff7ec6;
    --text:#111;
    --muted:#6d6d6d;
  }

  *{
    box-sizing:border-box;
  }

  body{
    background:#f6f6f8;
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,'Montserrat',sans-serif;
    color:var(--text);
  }

  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:16px 14px 34px;
  }

  .top-card{
    background:#fff;
    border-radius:22px;
    padding:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.05);
    margin:4px 0 12px;
    text-align:center;
  }

  .avatar{
    width:78px;
    height:78px;
    border-radius:50%;
    display:block;
    margin:6px auto 10px;
  }

  .kicker{
    font-size:14px;
    color:var(--muted);
    margin:0 0 6px;
    font-weight:900;
  }

  .headline{
    font-size:19px;
    line-height:1.18;
    margin:0 0 8px;
    font-weight:900;
  }

  .sub{
    font-size:14px;
    color:var(--muted);
    margin:0;
    font-weight:850;
  }

  .shein-btn{
    background:linear-gradient(135deg,var(--pink),var(--pink2));
    color:#fff;
    padding:16px 18px;
    border:0;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    border-radius:999px;
    width:100%;
    margin:12px auto 10px;
    text-decoration:none;
    box-shadow:0 18px 40px rgba(255,79,166,.26);
  }

  .btn-icon{
    width:44px;
    height:44px;
    border-radius:50%;
    background:#fff;
  }

  .btn-text{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    margin-left:12px;
  }

  .btn-title{
    font-size:16px;
    font-weight:900;
  }

  .btn-sub{
    font-size:12px;
    margin-top:3px;
    font-weight:900;
  }

  .btn-arrow{
    width:34px;
    height:34px;
    border-radius:999px;
    background:rgba(255,255,255,.24);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
  }

  .micro{
    text-align:center;
    font-size:12px;
    color:#7a7a7a;
    margin:8px 0 10px;
    font-weight:900;
  }

  .eligible-box{
    background:#fff;
    margin:10px auto 14px;
    padding:11px 14px;
    font-size:13px;
    text-align:center;
    color:#333;
    border-radius:14px;
    box-shadow:0 8px 18px rgba(0,0,0,.05);
    font-weight:900;
  }
</style>

<script defer src="https://cloud.umami.is/script.js"
data-website-id="2875d3d9-c203-43fe-b9ac-12b68848cc31"></script>

</head>

<body>

<div class="wrap">

  <div class="top-card">
    <img class="avatar" src="https://i.postimg.cc/rppXNYm8/67829a8592805-66f2edc54b343-image1.png"/>

    <p class="kicker">if you’re wondering too…</p>

    <h1 class="headline">this is the SHEIN gift card 💖</h1>

    <p class="sub">Tap below to continue.</p>
  </div>

  <a href="#" class="shein-btn cta-link">
    <img class="btn-icon" src="https://i.postimg.cc/zBfxrrSy/c5910bd5-e5b2-4c70-b124-9560d8cbf698-link-in-bio-links-block-home-2af2051e-f17c-4f49-8af7-1eac99.webp"/>

    <div class="btn-text">
      <span class="btn-title">Reveal my reward</span>
      <span class="btn-sub">Continue →</span>
    </div>

    <div class="btn-arrow">›</div>
  </a>

  <p class="micro">works on mobile • official partners</p>

  <div class="eligible-box" id="eligible-box">
    ✅ Checking availability...
  </div>

</div>

<script>
  const eligibleBox = document.getElementById('eligible-box');
  const buttons = document.querySelectorAll('.cta-link');

  const linkRest = "https://raintrkr.com/r/eyJ0Ijoic2hlaW4iLCJ0aWQiOiI2MzhhZTE3MDIyNjkxODg2NDkzOCIsInRzIjoxNzc3OTg5OTgxODYyfQ";

  const offerByCountry = {
    US: "3093",
    CA: "3105",
    GB: "3105",
    AU: "3105"
  };

  function getWeightedAffiliateId() {
    const saved = localStorage.getItem("shein_affiliate_split");

    if(saved) return saved;

    const affiliateId = Math.random() < 0.70 ? "16188" : "15802";

    localStorage.setItem("shein_affiliate_split", affiliateId);

    return affiliateId;
  }

  function buildOfferLink(cc){
    const offerId = offerByCountry[cc];

    if(!offerId) return linkRest;

    const affiliateId = getWeightedAffiliateId();

    return `https://giftclick.org/aff_c?offer_id=${offerId}&aff_id=${affiliateId}`;
  }

  function countryCodeToFlagEmoji(cc){
    if(!cc || cc.length !== 2) return "";

    return String.fromCodePoint(
      ...[...cc.toUpperCase()].map(c => 127397 + c.charCodeAt())
    );
  }

  function setEligible(cc, countryName){

    if(countryName){
      eligibleBox.textContent =
        `✅ Reward available in ${countryName} ${countryCodeToFlagEmoji(cc)}`;
    } else {
      eligibleBox.textContent =
        `✅ Reward available in your country 🌍`;
    }

    const target = buildOfferLink(cc);

    buttons.forEach(btn => {
      btn.href = target;
    });
  }

  fetch("https://ipapi.co/json/")
    .then(res => res.json())
    .then(data => {

      if(data && data.country){
        setEligible(data.country, data.country_name);
      } else {
        setEligible(null, null);
      }

    })
    .catch(() => {

      setEligible(null, null);

    });

  buttons.forEach((btn) => {

    btn.addEventListener('click', (e) => {

      e.preventDefault();

      const url = btn.href;

      if(window.umami){
        umami.track("SHEIN Offer Click");
      }

      setTimeout(() => {
        window.location.href = url;
      }, 160);

    });

  });
</script>

</body>
</html>
